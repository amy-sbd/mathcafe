<!DOCTYPE html>

<body class="flex justify-center min-h-screen text-stone-700 select-none">

  <main class="w-full max-w-md min-h-screen bg-[#FFFDF9] shadow-lg border-x border-[#EADBC8] flex flex-col">

          <div class="bg-white/80 border border-[#EADBC8] rounded-full px-3 py-1 text-xs font-bold text-[#AF8260]">

        </div>

  </p>
</div>

</div>

        <div class="bg-white rounded-2xl border border-stone-200 p-4 shadow-sm">

    // =========================

    function getTodayString() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

    function showScreen(name) {
      Object.values(screens).forEach(screen => screen.classList.remove("active"));
      screens[name].classList.add("active");
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function showToast(message) {
      toast.textContent = message;
      toast.style.opacity = "1";
      setTimeout(() => {
        toast.style.opacity = "0";
      }, 2200);
    }

        function getTodaySkill() {
      if (
        state.currentSkillIndex < 0 ||
        state.currentSkillIndex >= SKILLS.length ||
        !SKILLS[state.currentSkillIndex]
      ) {
        state.currentSkillIndex = 0;
      }

      return SKILLS[state.currentSkillIndex];
    }

    function getCurrentQuizSkill() {
  if (state.isReviewMode && state.reviewSkillId) {
    const reviewSkill = SKILLS.find(skill => skill.id === state.reviewSkillId);
    if (reviewSkill) {
      return reviewSkill;
    }
  }

  return getTodaySkill();
}

    function saveData() {

        points: state.points,
        streak: state.streak,
        lastPlayedDate: state.lastPlayedDate,
        unlockedSkillIds: state.unlockedSkillIds,
        currentSkillIndex: state.currentSkillIndex
      }));
    }

      try {
        const parsed = JSON.parse(saved);
        state.points = parsed.points || 0;
        state.streak = parsed.streak || 0;
        state.lastPlayedDate = parsed.lastPlayedDate || "";
        state.unlockedSkillIds = parsed.unlockedSkillIds || [];
        state.currentSkillIndex = parsed.currentSkillIndex || 0;
      } catch (e) {
        console.error("セーブデータの読み込みに失敗しました", e);
      }

      updateHome();
    }

    function updateHome() {
      const skill = getTodaySkill();

      pointText.textContent = state.points;
      streakText.textContent = state.streak;

      todaySkillName.textContent = `${skill.icon} ${skill.name}`;
      todaySkillDesc.textContent = skill.desc;
      todaySkillExample.textContent = skill.example;

      if (skill.visual) {
  visualStepStart.textContent = skill.visual.start;
  visualStepOne.textContent = skill.visual.step1;
  visualStepTwo.textContent = skill.visual.step2;
  visualStepEnd.textContent = skill.visual.end;
  visualStepTip.textContent = skill.visual.tip;
} else {
  visualStepStart.textContent = skill.example;
  visualStepOne.textContent = "① 式の中に使えそうな形を見つける";
  visualStepTwo.textContent = "② まとめたり、順番を変えたりする";
  visualStepEnd.textContent = "③ 計算しやすい形にする";
  visualStepTip.textContent = "計算ワザは、答えを急ぐより『どこを見るか』が大事です。";
}

      const randomIndex = Math.floor(Math.random() * CHARACTER_MESSAGES.length);
      characterMessage.textContent = CHARACTER_MESSAGES[randomIndex];
      const unlockedCount = state.unlockedSkillIds.length;
const totalCount = SKILLS.length;
const progressPercent = totalCount === 0 ? 0 : (unlockedCount / totalCount) * 100;

bookCountText.textContent = unlockedCount;
bookTotalText.textContent = totalCount;
bookProgressBar.style.width = `${progressPercent}%`;

if (unlockedCount === 0) {
  bookProgressMessage.textContent = "まずは1つ目のワザを登録しよう。";
} else if (unlockedCount < totalCount) {
  bookProgressMessage.textContent = "少しずつワザが集まってきたよ。";
} else {
  bookProgressMessage.textContent = "全部のワザを登録できたよ！復習で使えるようにしていこう。";
}
    }

    // =========================
    // クイズ
    // =========================

    function startQuiz() {
  state.isReviewMode = false;
  state.reviewSkillId = "";
  state.currentQuestionIndex = 0;
  state.correctCount = 0;
  state.answered = false;

  loadQuestion();
  showScreen("quiz");
}

function startReviewQuiz() {
  if (state.unlockedSkillIds.length === 0) {
    showToast("まずは今日のワザを1つ登録しよう 📖");
    return;
  }

  const randomIndex = Math.floor(Math.random() * state.unlockedSkillIds.length);
  state.reviewSkillId = state.unlockedSkillIds[randomIndex];
  state.isReviewMode = true;
  state.currentQuestionIndex = 0;
  state.correctCount = 0;
  state.answered = false;

  loadQuestion();
  showScreen("quiz");
}

    function loadQuestion() {
      const skill = getCurrentQuizSkill();
      const question = skill.questions[state.currentQuestionIndex];

      state.answered = false;

      quizProgressText.textContent = `${state.currentQuestionIndex + 1} / ${skill.questions.length} 問め`;
      quizSkillName.textContent = `${skill.icon} ${skill.name}`;
      quizSkillHint.textContent = skill.hint;

      if (state.isReviewMode) {
  quizModeLabel.textContent = "登録済みワザの復習";
  reviewBadge.classList.remove("hidden");
} else {
  quizModeLabel.textContent = "今日のワザ";
  reviewBadge.classList.add("hidden");
}

      questionText.innerHTML = question.q.replace(/\n/g, "<br>");

      feedbackBox.classList.add("hidden");
      nextQuestionBtn.classList.add("hidden");

      optionArea.innerHTML = "";

      question.options.forEach((option, index) => {
        const btn = document.createElement("button");
        btn.className = "w-full text-left bg-[#FFFDF9] hover:bg-[#FAF6F0] active:bg-[#F3D7CA] border border-stone-200 hover:border-stone-400 p-3.5 rounded-xl text-sm font-semibold transition-all shadow-sm flex items-center justify-between";

        btn.innerHTML = `
          <span>${option}</span>
          <span class="text-xs text-stone-300">☕</span>
        `;

        btn.addEventListener("click", () => answerQuestion(index));
        optionArea.appendChild(btn);
      });
    }

    function answerQuestion(selectedIndex) {
      if (state.answered) return;

      state.answered = true;

      const skill = getCurrentQuizSkill();
      const question = skill.questions[state.currentQuestionIndex];
      const isCorrect = selectedIndex === question.answer;

      const buttons = optionArea.querySelectorAll("button");

      buttons.forEach((btn, index) => {
        btn.disabled = true;

        const mark = btn.querySelector("span:last-child");

        if (index === question.answer) {
          btn.classList.remove("bg-[#FFFDF9]", "border-stone-200");
          btn.classList.add("bg-emerald-50", "border-emerald-300", "text-emerald-700");
          mark.textContent = "⭕";
        } else if (index === selectedIndex) {
          btn.classList.remove("bg-[#FFFDF9]", "border-stone-200");
          btn.classList.add("bg-rose-50", "border-rose-300", "text-rose-700");
          mark.textContent = "❌";
        } else {
          btn.classList.add("opacity-40");
        }
      });

      if (isCorrect) {
        state.correctCount++;
        feedbackBox.className = "mt-4 p-3 rounded-xl text-center text-sm font-bold bg-emerald-50 text-emerald-800 border border-emerald-200";
        feedbackBox.innerHTML = `🌟 せいかい！<br><span class="text-xs font-normal">${question.exp}</span>`;
      } else {
        feedbackBox.className = "mt-4 p-3 rounded-xl text-center text-sm font-bold bg-rose-50 text-rose-800 border border-rose-200";
        feedbackBox.innerHTML = `🍓 おしい！<br><span class="text-xs font-normal">${question.exp}</span>`;
      }

      feedbackBox.classList.remove("hidden");
      nextQuestionBtn.classList.remove("hidden");
    }

    function goNextQuestion() {
      const skill = getTodaySkill();

      state.currentQuestionIndex++;

      if (state.currentQuestionIndex < skill.questions.length) {
        loadQuestion();
      } else {
        finishQuiz();
      }
    }

    function finishQuiz() {
  const skill = getCurrentQuizSkill();
  const today = getTodayString();

  let earned = 0;

  if (state.isReviewMode) {
    // 復習モードは少なめポイント
    earned = state.correctCount * 2;

    if (state.correctCount === 3) {
      earned += 2;
    }
  } else {
    // 今日のチャレンジは通常ポイント
    earned = state.correctCount * 5;

    if (state.correctCount === 3) {
      earned += 5;
    }
  }

  state.points += earned;

  if (!state.isReviewMode) {
    // 今日のチャレンジだけ図鑑登録
    if (!state.unlockedSkillIds.includes(skill.id)) {
      state.unlockedSkillIds.push(skill.id);
    }

    // 今日のチャレンジだけ連続日数を更新
    if (state.lastPlayedDate !== today) {
      state.streak += 1;
      state.lastPlayedDate = today;
    }

    // 今日のチャレンジだけ次のワザへ進む
    state.currentSkillIndex = (state.currentSkillIndex + 1) % SKILLS.length;
  }

  resultCorrectText.textContent = state.correctCount;
  earnedPointText.textContent = earned;

  if (state.isReviewMode) {
    if (state.correctCount === 3) {
      resultIcon.textContent = "💮";
      resultMessage.textContent = "復習パーフェクト！前に覚えたワザがちゃんと残ってるね。";
    } else if (state.correctCount === 2) {
      resultIcon.textContent = "🔁";
      resultMessage.textContent = "いい復習になったね。忘れかけたところを思い出せたら成功です。";
    } else if (state.correctCount === 1) {
      resultIcon.textContent = "☕";
      resultMessage.textContent = "復習は思い出す練習。もう一度見るだけでも意味があります。";
    } else {
      resultIcon.textContent = "🍪";
      resultMessage.textContent = "忘れていても大丈夫。図鑑で見方を確認してから、またやってみよう。";
    }
  } else {
    if (state.correctCount === 3) {
      resultIcon.textContent = "🏆";
      resultMessage.textContent = "パーフェクト！このワザ、かなり使えるようになってきたね。";
    } else if (state.correctCount === 2) {
      resultIcon.textContent = "🎉";
      resultMessage.textContent = "いい感じ！考え方はかなりつかめてるよ。";
    } else if (state.correctCount === 1) {
      resultIcon.textContent = "☕";
      resultMessage.textContent = "今日はワザを知っただけでもOK。次はもっと見えるはず。";
    } else {
      resultIcon.textContent = "🍪";
      resultMessage.textContent = "まだ練習中。解説を読めたら今日はちゃんと前進だよ。";
    }
  }

  saveData();
  updateHome();
  showScreen("result");
}

    // =========================
    // 図鑑
    // =========================

    function renderBook() {
      bookList.innerHTML = "";

      SKILLS.forEach((skill, index) => {
        const unlocked = state.unlockedSkillIds.includes(skill.id);

        const card = document.createElement("div");
        card.className = unlocked
          ? "bg-white border border-[#EADBC8] rounded-2xl p-4 shadow-sm"
          : "bg-stone-100 border border-stone-200 rounded-2xl p-4 opacity-70";

        if (unlocked) {
          card.innerHTML = `
  <div class="flex items-start gap-3">
    <div class="text-3xl">${skill.icon}</div>
    <div class="flex-1">
      <div class="flex items-center gap-2 mb-1">
        <span class="text-[10px] bg-[#F5EBE0] text-[#AF8260] px-2 py-0.5 rounded-full font-bold">
          No.${index + 1}
        </span>
        <span class="text-[10px] bg-emerald-50 text-emerald-700 px-2 py-0.5 rounded-full font-bold border border-emerald-200">
          登録済み
        </span>
      </div>

      <h3 class="font-bold text-[#AF8260]">${skill.name}</h3>
      <p class="text-xs text-stone-500 mt-1 leading-relaxed">${skill.desc}</p>

      <div class="bg-[#FBF9F1] border border-stone-200 rounded-xl p-2 mt-3">
        <p class="text-[11px] text-stone-400 mb-1">例</p>
        <p class="text-xs font-bold text-stone-700">${skill.example}</p>
      </div>
    </div>
  </div>
`;
        } else {
          card.innerHTML = `
  <div class="flex items-center gap-3">
    <div class="text-3xl">🔒</div>
    <div>
      <div class="mb-1">
        <span class="text-[10px] bg-white text-stone-400 px-2 py-0.5 rounded-full font-bold border border-stone-200">
          No.${index + 1}
        </span>
      </div>
      <h3 class="font-bold text-stone-500">まだ見つけていないワザ</h3>
      <p class="text-xs text-stone-400 mt-1">3問チャレンジで登録されます。</p>
    </div>
  </div>
`;
        }

        bookList.appendChild(card);
      });
    }

    // =========================
    // イベント
    // =========================

    startQuizBtn.addEventListener("click", startQuiz);
    reviewQuizBtn.addEventListener("click", startReviewQuiz);

    openBookBtn.addEventListener("click", () => {
      renderBook();
      showScreen("book");
    });

    backHomeBtn.addEventListener("click", () => {
      showScreen("home");
    });

    nextQuestionBtn.addEventListener("click", goNextQuestion);

    goBookBtn.addEventListener("click", () => {
      renderBook();
      showScreen("book");
    });

    resultHomeBtn.addEventListener("click", () => {
      showScreen("home");
    });

    bookHomeBtn.addEventListener("click", () => {
      showScreen("home");
    });

    resetBtn.addEventListener("click", () => {
      const ok = window.confirm("データをすべて消して、最初からやり直しますか？");

      if (!ok) return;

      localStorage.removeItem("math_cafe_toolbook_save");

      state = {
        points: 0,
        streak: 0,
        lastPlayedDate: "",
        unlockedSkillIds: [],
        currentSkillIndex: 0,
        currentQuestionIndex: 0,
        correctCount: 0,
        answered: false,
        quizFinishedToday: false
      };

      updateHome();
      renderBook();
      showScreen("home");
      showToast("データをリセットしました ☕");
    });

    // =========================
    // 起動
    // =========================

    window.addEventListener("load", () => {
      loadData();
    });
  </script>
</body>
</html>
